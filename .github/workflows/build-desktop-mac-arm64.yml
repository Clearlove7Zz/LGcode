name: build-desktop-mac-arm64

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Build channel"
        required: false
        type: choice
        default: prod
        options:
          - prod
          - beta
          - dev

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Build
        run: bun run build
        working-directory: packages/desktop
        env:
          LOONGCODE_CHANNEL: ${{ inputs.channel }}

      - name: Package
        run: npx electron-builder --mac --arm64 --publish never --config electron-builder.config.ts
        working-directory: packages/desktop
        env:
          LOONGCODE_CHANNEL: ${{ inputs.channel }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loongcode-desktop-mac-arm64
          path: |
            packages/desktop/dist/*.dmg
            packages/desktop/dist/*.zip
          if-no-files-found: ignore
